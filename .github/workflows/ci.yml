name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

      - name: Verify generated endpoints
        run: |
          dart run tool/generate_typed_endpoints.dart
          git diff --exit-code -- lib/src/api/typed_endpoints.dart

      - name: Prepublish safety check
        run: dart run tool/prepublish_check.dart
