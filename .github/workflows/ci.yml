name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Run all checks
        run: dart run tool/check_all.dart
